name: Update Open Report Tracker

on:
  schedule:
    - cron: "*/30 * * * *"
  issues:
    types: [opened, closed, reopened, edited, deleted]
  workflow_dispatch: {}

concurrency:
  group: update-tracker
  cancel-in-progress: false

permissions:
  contents: write
  issues: read

jobs:
  build-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: pip install pillow

      - name: Build tracker image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build_tracker.py

      - name: Commit updated tracker image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/tracker.png
          git diff --quiet --cached || git commit -m "Update open report tracker"
          git pull --rebase origin main
          git push
